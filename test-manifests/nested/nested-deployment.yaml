apiVersion: apps/v1
kind: Deployment
metadata:
  name: nested-test-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
      - name: web
        image: nginx:1.14.2
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nested-app-secret
              key: password